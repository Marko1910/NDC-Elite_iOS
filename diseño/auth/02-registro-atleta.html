<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport"/>
<title>NDC HQ - Sign Up</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary-fixed": "#221b00",
                        "surface-tint": "#2f6384",
                        "on-secondary-container": "#756100",
                        "secondary": "#705d00",
                        "primary-fixed": "#c8e6ff",
                        "primary-fixed-dim": "#9accf2",
                        "inverse-surface": "#2e3034",
                        "surface-dim": "#d9dade",
                        "on-primary-container": "#90c2e7",
                        "background": "#f9f9fe",
                        "outline": "#71787e",
                        "error-container": "#ffdad6",
                        "tertiary-container": "#00489c",
                        "surface-container-lowest": "#ffffff",
                        "tertiary-fixed": "#d8e2ff",
                        "secondary-fixed": "#ffe16e",
                        "on-primary-fixed-variant": "#0e4b6b",
                        "surface-container-highest": "#e2e2e7",
                        "on-surface-variant": "#41484d",
                        "tertiary-fixed-dim": "#adc6ff",
                        "surface": "#f9f9fe",
                        "surface-bright": "#f9f9fe",
                        "secondary-container": "#ffde59",
                        "primary": "#003953",
                        "on-error-container": "#93000a",
                        "surface-container-high": "#e8e8ed",
                        "primary-container": "#165070",
                        "on-primary-fixed": "#001e2f",
                        "on-background": "#1a1c1f",
                        "surface-variant": "#e2e2e7",
                        "surface-container": "#ededf2",
                        "on-surface": "#1a1c1f",
                        "on-primary": "#ffffff",
                        "on-tertiary-container": "#9bbbff",
                        "on-tertiary-fixed": "#001a41",
                        "on-tertiary-fixed-variant": "#004493",
                        "tertiary": "#003271",
                        "secondary-fixed-dim": "#e4c542",
                        "outline-variant": "#c1c7ce",
                        "on-secondary-fixed-variant": "#544600",
                        "inverse-primary": "#9accf2",
                        "surface-container-low": "#f3f3f8",
                        "on-tertiary": "#ffffff",
                        "on-secondary": "#ffffff",
                        "on-error": "#ffffff",
                        "inverse-on-surface": "#f0f0f5",
                        "error": "#ba1a1a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-lg": "1.5rem",
                        "margin-main": "1.25rem",
                        "gutter": "1rem",
                        "stack-md": "1rem",
                        "safe-area-bottom": "2.125rem",
                        "stack-sm": "0.5rem"
                    },
                    "fontFamily": {
                        "body-lg": ["Inter"],
                        "label-bold": ["Inter"],
                        "headline-md": ["Hanken Grotesk"],
                        "body-md": ["Inter"],
                        "stats-xl": ["Hanken Grotesk"],
                        "headline-sm": ["Hanken Grotesk"],
                        "display-lg": ["Hanken Grotesk"],
                        "label-sm": ["Inter"]
                    },
                    "fontSize": {
                        "body-lg": ["17px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "label-bold": ["13px", { "lineHeight": "18px", "fontWeight": "600" }],
                        "headline-md": ["24px", { "lineHeight": "30px", "letterSpacing": "0px", "fontWeight": "700" }],
                        "body-md": ["15px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "stats-xl": ["48px", { "lineHeight": "48px", "letterSpacing": "-1px", "fontWeight": "800" }],
                        "headline-sm": ["20px", { "lineHeight": "25px", "fontWeight": "600" }],
                        "display-lg": ["34px", { "lineHeight": "41px", "letterSpacing": "-0.5px", "fontWeight": "800" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "fontWeight": "500" }]
                    }
                }
            }
        }
    </script>
<style>
        body {
            -webkit-tap-highlight-color: transparent;
            background-color: theme('colors.background');
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col pt-safe-area-top pb-safe-area-bottom antialiased selection:bg-secondary-container selection:text-on-secondary-container">
<!-- Transactional Screen: Navigation shells suppressed -->
<main class="flex-1 w-full max-w-md mx-auto px-margin-main py-stack-lg flex flex-col justify-center min-h-screen">
<header class="mb-stack-lg text-center">
<h1 class="font-display-lg text-display-lg text-primary-container mb-stack-sm tracking-tight">Únete a la Élite</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Completa tu registro para acceder a NDC HQ.</p>
</header>
<form class="flex flex-col space-y-stack-md w-full glass-panel p-6 rounded-xl shadow-sm">
<div class="flex flex-col space-y-2">
<label class="font-label-bold text-label-bold text-primary-container" for="fullName">Nombre completo</label>
<input class="w-full bg-surface-container-low border border-outline-variant rounded-lg px-4 py-3 font-body-lg text-body-lg text-on-surface focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-colors" id="fullName" placeholder="Ej. Juan Pérez" type="text"/>
</div>
<div class="flex flex-col space-y-2">
<label class="font-label-bold text-label-bold text-primary-container" for="email">Correo electrónico</label>
<input class="w-full bg-surface-container-low border border-outline-variant rounded-lg px-4 py-3 font-body-lg text-body-lg text-on-surface focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-colors" id="email" placeholder="juan@ejemplo.com" type="email"/>
</div>
<div class="flex flex-col space-y-2">
<label class="font-label-bold text-label-bold text-primary-container" for="phone">Número de celular</label>
<input class="w-full bg-surface-container-low border border-outline-variant rounded-lg px-4 py-3 font-body-lg text-body-lg text-on-surface focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-colors" id="phone" placeholder="+34 600 000 000" type="tel"/>
</div>
<div class="flex flex-col space-y-2">
<label class="font-label-bold text-label-bold text-primary-container" for="password">Contraseña</label>
<div class="relative">
<input class="w-full bg-surface-container-low border border-outline-variant rounded-lg px-4 py-3 font-body-lg text-body-lg text-on-surface focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-colors" id="password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-outline hover:text-primary-container transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<div class="flex flex-col space-y-2 pt-2 pb-2 bg-secondary-fixed/10 p-4 rounded-lg border border-secondary-fixed/30 mt-2">
<label class="font-label-bold text-label-bold text-primary-container flex items-center gap-1" for="inviteCode">
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">key</span>
                    Código de Invitación <span class="text-error">*</span>
</label>
<input class="w-full bg-surface-container-lowest border-2 border-secondary-container rounded-lg px-4 py-3 font-body-lg text-body-lg text-on-surface focus:outline-none focus:border-primary-container transition-colors uppercase" id="inviteCode" placeholder="Ingresa el código" required="" type="text"/>
<p class="font-label-sm text-label-sm text-on-surface-variant">Este código es proporcionado exclusivamente por tu coach.</p>
</div>
<button class="w-full bg-primary-container text-on-primary font-headline-sm text-headline-sm py-4 rounded-lg mt-stack-md hover:bg-primary transition-colors active:scale-95 shadow-[0_4px_12px_rgba(22,80,112,0.2)]" type="submit">
                Crear Cuenta
            </button>
</form>
<div class="mt-stack-lg text-center">
<a class="font-body-md text-body-md text-primary-container hover:text-primary transition-colors hover:underline" href="#">
                ¿Ya tengo cuenta? Iniciar Sesión
            </a>
</div>
</main>
</body></html>
