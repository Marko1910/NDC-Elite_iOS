<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport"/>
<title>Generar QR de Asistencia</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "surface-dim": "#d9dade",
                      "surface-bright": "#f9f9fe",
                      "outline": "#71787e",
                      "on-error": "#ffffff",
                      "on-primary-fixed": "#001e2f",
                      "background": "#f9f9fe",
                      "on-tertiary-fixed-variant": "#004493",
                      "error": "#ba1a1a",
                      "on-surface-variant": "#41484d",
                      "primary-fixed-dim": "#9accf2",
                      "tertiary-fixed": "#d8e2ff",
                      "on-surface": "#1a1c1f",
                      "outline-variant": "#c1c7ce",
                      "surface-container-low": "#f3f3f8",
                      "secondary-container": "#ffde59",
                      "on-secondary-fixed-variant": "#544600",
                      "surface-container": "#ededf2",
                      "on-tertiary-container": "#9bbbff",
                      "on-secondary-fixed": "#221b00",
                      "secondary-fixed-dim": "#e4c542",
                      "inverse-on-surface": "#f0f0f5",
                      "surface-tint": "#2f6384",
                      "surface-container-lowest": "#ffffff",
                      "primary-fixed": "#c8e6ff",
                      "primary": "#003953",
                      "on-primary": "#ffffff",
                      "primary-container": "#165070",
                      "surface-container-high": "#e8e8ed",
                      "tertiary": "#003271",
                      "on-secondary-container": "#756100",
                      "on-secondary": "#ffffff",
                      "tertiary-fixed-dim": "#adc6ff",
                      "on-tertiary": "#ffffff",
                      "on-error-container": "#93000a",
                      "error-container": "#ffdad6",
                      "secondary-fixed": "#ffe16e",
                      "surface-variant": "#e2e2e7",
                      "on-background": "#1a1c1f",
                      "on-tertiary-fixed": "#001a41",
                      "inverse-surface": "#2e3034",
                      "on-primary-fixed-variant": "#0e4b6b",
                      "surface": "#f9f9fe",
                      "inverse-primary": "#9accf2",
                      "on-primary-container": "#90c2e7",
                      "tertiary-container": "#00489c",
                      "secondary": "#705d00",
                      "surface-container-highest": "#e2e2e7"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "stack-sm": "0.5rem",
                      "stack-md": "1rem",
                      "safe-area-bottom": "2.125rem",
                      "stack-lg": "1.5rem",
                      "margin-main": "1.25rem",
                      "gutter": "1rem"
              },
              "fontFamily": {
                      "headline-md": ["Hanken Grotesk"],
                      "headline-sm": ["Hanken Grotesk"],
                      "display-lg": ["Hanken Grotesk"],
                      "label-sm": ["Inter"],
                      "label-bold": ["Inter"],
                      "stats-xl": ["Hanken Grotesk"],
                      "body-md": ["Inter"],
                      "body-lg": ["Inter"]
              },
              "fontSize": {
                      "headline-md": ["24px", {"lineHeight": "30px", "letterSpacing": "0px", "fontWeight": "700"}],
                      "headline-sm": ["20px", {"lineHeight": "25px", "fontWeight": "600"}],
                      "display-lg": ["34px", {"lineHeight": "41px", "letterSpacing": "-0.5px", "fontWeight": "800"}],
                      "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
                      "label-bold": ["13px", {"lineHeight": "18px", "fontWeight": "600"}],

                      "body-lg": ["17px", {"lineHeight": "24px", "fontWeight": "400"}]

            }
          }
        }
    </script>
<style>
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
        }
        
        .qr-placeholder-bg {
            background-color: #ffffff;
            background-image: radial-gradient(circle, #c1c7ce 1px, transparent 1px);
            background-size: 16px 16px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface antialiased min-h-screen flex flex-col pt-safe-area-top">
<!-- TopAppBar -->
<header class="bg-surface/80 dark:bg-surface-dim/80 backdrop-blur-md rounded-t-xl w-full flex justify-between items-center px-margin-main h-14 sticky top-0 z-40">
<button aria-label="Volver" class="text-primary active:scale-95 transition-transform hover:opacity-80 p-2 -ml-2">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back_ios_new</span>
</button>
<h1 class="font-headline-sm text-headline-sm text-primary">Generar QR de Asistencia</h1>
<div class="w-8"></div> <!-- Spacer for alignment -->
</header>
<!-- Main Content Canvas -->
<main class="flex-1 px-margin-main pb-safe-area-bottom pt-stack-md flex flex-col gap-stack-lg max-w-md mx-auto w-full">
<!-- Class Info Banner -->
<div class="bg-surface-container rounded-xl p-4 flex items-center gap-4">
<div class="bg-secondary-container text-on-secondary-container rounded-full w-12 h-12 flex items-center justify-center shrink-0">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">timer</span>
</div>
<div>
<p class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider mb-1">Clase Actual</p>
<h2 class="font-headline-sm text-headline-sm text-on-surface">07:00 AM - El Titán</h2>
</div>
</div>
<!-- QR Code Card -->
<div class="glass-card rounded-2xl p-6 flex flex-col items-center gap-6">
<p class="font-body-md text-body-md text-on-surface-variant text-center max-w-xs">
                Los atletas deben escanear este código desde su app NDC para registrar su asistencia automáticamente.
            </p>
<div class="relative w-64 h-64 bg-white rounded-xl shadow-sm border border-outline-variant/30 flex items-center justify-center overflow-hidden">
<!-- QR Placeholder (Data Store pattern could be used, using a styled placeholder for now) -->
<div class="absolute inset-4 qr-placeholder-bg rounded-lg opacity-80 flex items-center justify-center">
<span class="material-symbols-outlined text-outline-variant text-opacity-30" style="font-size: 120px;">qr_code_scanner</span>
</div>
<!-- Simulated QR corners -->
<div class="absolute top-4 left-4 w-12 h-12 border-4 border-primary rounded-sm"></div>
<div class="absolute top-4 right-4 w-12 h-12 border-4 border-primary rounded-sm"></div>
<div class="absolute bottom-4 left-4 w-12 h-12 border-4 border-primary rounded-sm"></div>
<!-- Center Logo -->
<div class="absolute inset-0 flex items-center justify-center">
<div class="bg-white p-2 rounded-lg shadow-sm border border-outline-variant/20 z-10">
<span class="material-symbols-outlined text-primary" style="font-size: 32px; font-variation-settings: 'FILL' 1;">fitness_center</span>
</div>
</div>
</div>
<div class="flex items-center gap-2 text-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1; font-size: 20px;">verified</span>
<span class="font-label-bold text-label-bold">Código activo y listo</span>
</div>
</div>
<!-- Action Buttons -->
<div class="flex flex-col gap-stack-md mt-auto pt-stack-md pb-stack-lg">
<button class="w-full bg-primary-container text-on-primary-container font-headline-sm text-headline-sm py-4 rounded-xl flex items-center justify-center gap-2 hover:opacity-90 active:scale-[0.98] transition-all shadow-[0_4px_12px_rgba(22,80,112,0.1)]">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">print</span>
                Imprimir Código QR
            </button>
<button class="w-full border border-primary-container text-primary-container font-headline-sm text-headline-sm py-4 rounded-xl flex items-center justify-center gap-2 hover:bg-primary-container/5 active:scale-[0.98] transition-all bg-transparent">
<span class="material-symbols-outlined">share</span>
                Compartir Digitalmente
            </button>
</div>
</main>
</body></html>
