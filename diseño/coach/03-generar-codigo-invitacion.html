<script>
        function generateNewCode() {
            const characters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let result = 'NDC-';
            for ( let i = 0; i < 4; i++ ) {
                result += characters.charAt(Math.floor(Math.random() * characters.length));
            }
            
            const codeElement = document.getElementById('invite-code');
            
            // Simple animation
            codeElement.style.opacity = '0';
            codeElement.style.transform = 'scale(0.95)';
            
            setTimeout(() => {
                codeElement.innerText = result;
                codeElement.style.opacity = '1';
                codeElement.style.transform = 'scale(1)';
                codeElement.style.transition = 'all 0.3s cubic-bezier(0.4, 0, 0.2, 1)';
            }, 150);
        }
    </script>
