<style>
        body {
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: contain;
        }
        .scanner-corners {
            position: relative;
        }
        .scanner-corners::before, .scanner-corners::after, 
        .scanner-corners span::before, .scanner-corners span::after {
            content: '';
            position: absolute;
            width: 40px;
            height: 40px;
            border-color: #FFDE59;
            border-width: 6px;
        }
        .scanner-corners::before { top: 0; left: 0; border-right: 0; border-bottom: 0; border-top-left-radius: 24px; }
        .scanner-corners::after { top: 0; right: 0; border-left: 0; border-bottom: 0; border-top-right-radius: 24px; }
        .scanner-corners span::before { bottom: 0; left: 0; border-right: 0; border-top: 0; border-bottom-left-radius: 24px; }
        .scanner-corners span::after { bottom: 0; right: 0; border-left: 0; border-top: 0; border-bottom-right-radius: 24px; }
        
        .scan-line {
            height: 3px;
            background: linear-gradient(to right, transparent, #FFDE59, transparent);
            position: absolute;
            width: 100%;
            top: 0;
            animation: scan 2.5s infinite linear;
            box-shadow: 0 0 15px #FFDE59;
        }
        
        @keyframes scan {
            0% { top: 5%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 95%; opacity: 0; }
        }

        .blur-ios {
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
        }
    </style>
<style>
    body {

<!-- Exclusion Rule applied: "Task-Focused: Any sub-page featuring a 'Close' or 'Back' action implies a temporary departure" -->
<script>
        // Simple micro-interaction for the success card entrance
        document.addEventListener('DOMContentLoaded', () => {
            const card = document.querySelector('.bg-surface-container-lowest');
            card.style.opacity = '0';
            card.style.transform = 'translateY(20px)';
            
            setTimeout(() => {
                card.style.transition = 'all 0.6s cubic-bezier(0.22, 1, 0.36, 1)';
                card.style.opacity = '1';
                card.style.transform = 'translateY(0)';
            }, 300);
        });

        // Flash interaction for scanner
        setInterval(() => {
            const corners = document.querySelector('.scanner-corners');
            corners.style.transition = 'opacity 0.1s';
            corners.style.opacity = '0.8';
            setTimeout(() => corners.style.opacity = '1', 100);
        }, 3000);
    </script>
