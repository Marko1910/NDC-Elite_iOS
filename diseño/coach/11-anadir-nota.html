<!DOCTYPE html><html class="light" lang="es"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
<title>Añadir Nota de Atleta</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Hanken+Grotesk:wght@600;700;800&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-high": "#e8e8ed",
                        "on-tertiary-fixed": "#001a41",
                        "inverse-on-surface": "#f0f0f5",
                        "surface-variant": "#e2e2e7",
                        "on-tertiary": "#ffffff",
                        "on-primary": "#ffffff",
                        "tertiary-container": "#00489c",
                        "surface-bright": "#f9f9fe",
                        "on-secondary": "#ffffff",
                        "secondary-fixed": "#ffe16e",
                        "surface-container": "#ededf2",
                        "error-container": "#ffdad6",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-fixed-variant": "#004493",
                        "on-secondary-container": "#756100",
                        "on-primary-fixed-variant": "#0e4b6b",
                        "on-primary-fixed": "#001e2f",
                        "on-background": "#1a1c1f",
                        "outline": "#71787e",
                        "tertiary": "#003271",
                        "surface": "#f9f9fe",
                        "on-primary-container": "#90c2e7",
                        "on-error": "#ffffff",
                        "surface-dim": "#d9dade",
                        "on-surface": "#1a1c1f",
                        "inverse-surface": "#2e3034",
                        "primary-fixed": "#c8e6ff",
                        "primary": "#003953",
                        "on-surface-variant": "#41484d",
                        "primary-fixed-dim": "#9accf2",
                        "background": "#f9f9fe",
                        "outline-variant": "#c1c7ce",
                        "secondary-fixed-dim": "#e4c542",
                        "surface-tint": "#2f6384",
                        "tertiary-fixed-dim": "#adc6ff",
                        "error": "#ba1a1a",
                        "surface-container-low": "#f3f3f8",
                        "on-tertiary-container": "#9bbbff",
                        "on-error-container": "#93000a",
                        "secondary-container": "#ffde59",
                        "on-secondary-fixed-variant": "#544600",
                        "tertiary-fixed": "#d8e2ff",
                        "surface-container-highest": "#e2e2e7",
                        "secondary": "#705d00",
                        "inverse-primary": "#9accf2",
                        "primary-container": "#165070"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-sm": "0.5rem",
                        "stack-lg": "1.5rem",
                        "safe-area-bottom": "2.125rem",
                        "margin-main": "1.25rem",
                        "gutter": "1rem",
                        "stack-md": "1rem"
                    },
                    "fontFamily": {
                        "body-lg": ["Inter"],
                        "label-sm": ["Inter"],
                        "stats-xl": ["Hanken Grotesk"],
                        "display-lg": ["Hanken Grotesk"],
                        "body-md": ["Inter"],
                        "label-bold": ["Inter"],
                        "headline-sm": ["Hanken Grotesk"],
                        "headline-md": ["Hanken Grotesk"]
                    },
                    "fontSize": {
                        "body-lg": ["17px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
                        "stats-xl": ["48px", {"lineHeight": "48px", "letterSpacing": "-1px", "fontWeight": "800"}],
                        "display-lg": ["34px", {"lineHeight": "41px", "letterSpacing": "-0.5px", "fontWeight": "800"}],
                        "body-md": ["15px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "label-bold": ["13px", {"lineHeight": "18px", "fontWeight": "600"}],
                        "headline-sm": ["20px", {"lineHeight": "25px", "fontWeight": "600"}],
                        "headline-md": ["24px", {"lineHeight": "30px", "letterSpacing": "0px", "fontWeight": "700"}]
                    }
                },
            },
        }
    </script>
<style>
        .glass-effect {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        body {
            -webkit-tap-highlight-color: transparent;
        }
        .category-chip.active {
            background-color: #165070;
            color: #ffffff;
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen font-body-md selection:bg-secondary-container">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-surface/80 glass-effect flex justify-between items-center px-margin-main h-14 w-full">
<div class="flex items-center gap-4">
<button aria-label="Volver" class="active:scale-95 transition-transform hover:opacity-70">
<span class="material-symbols-outlined text-primary text-[28px]" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline-sm text-headline-sm text-primary">Añadir Nota</h1>
</div>
<div class="flex items-center">
<button aria-label="Más opciones" class="active:scale-95 transition-transform hover:opacity-70">
<span class="material-symbols-outlined text-primary" data-icon="more_vert">more_vert</span>
</button>
</div>
</header>
<main class="pt-14 pb-safe-area-bottom px-margin-main flex flex-col min-h-screen">
<!-- Athlete Context Section -->
<section class="mt-stack-lg mb-stack-md flex items-center gap-4 p-4 bg-surface-container rounded-xl">
<img alt="Foto de perfil del atleta" class="w-12 h-12 rounded-full object-cover border-2 border-primary-container" data-alt="A professional close-up portrait of a determined male CrossFit athlete in his 30s with short hair and athletic build. The lighting is high-key and soft, characteristic of a high-end fitness studio. The background is a clean, minimalist gym environment with neutral gray tones and professional equipment. The overall aesthetic is polished, modern, and high-performance, aligning with a premium executive athletic identity." src="https://lh3.googleusercontent.com/aida-public/AB6AXuB4pdLkdS8mBVoqQOYZ6QNKJXRRVyUCCXO9n4wT-NDqBlF3ts3zyFvuiU1tcesz8Oym97_Rj7fdbJgs4C8F1B99XIXrAovjpeUHsuM8Lzv8DKHy_0D31TLrZYnib1wvWJKASyGJH_osUQgUrwbCA1JA5PBPbyY7lcgcMkE8klAgEs0VSW2hl5_wqvgM-1UkQA1Kcg1S2p07Ht7Z35X3CUFLovh9gmpLQTQXiiJ1fpEG85x-QTIRI_EEwSDb2yHdM5NNaQcAshnb6a7N">
<div>
<h2 class="font-label-bold text-body-lg text-primary">Marcos Rodríguez</h2>
<p class="font-label-sm text-on-surface-variant">Atleta RX • Última sesión: Hoy</p>
</div>
</section>
<!-- Category Selector -->
<section class="mb-stack-lg">
<label class="font-label-bold text-label-bold text-on-surface-variant block mb-stack-sm ml-1">CATEGORÍA</label>
<div class="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
<button class="category-chip active flex-shrink-0 px-4 py-2 rounded-full font-label-bold text-label-bold transition-all border border-outline-variant/30 bg-surface-container-high text-on-surface-variant" onclick="selectCategory(this)">
                    General
                </button>
<button class="category-chip flex-shrink-0 px-4 py-2 rounded-full font-label-bold text-label-bold transition-all border border-outline-variant/30 bg-surface-container-high text-on-surface-variant" onclick="selectCategory(this)">
                    Performance
                </button>
<button class="category-chip flex-shrink-0 px-4 py-2 rounded-full font-label-bold text-label-bold transition-all border border-outline-variant/30 bg-surface-container-high text-on-surface-variant" onclick="selectCategory(this)">
                    Lesión
                </button>
<button class="category-chip flex-shrink-0 px-4 py-2 rounded-full font-label-bold text-label-bold transition-all border border-outline-variant/30 bg-surface-container-high text-on-surface-variant" onclick="selectCategory(this)">
                    Nutrición
                </button>
</div>
</section>
<!-- Note Text Area -->
<section class="flex-grow flex flex-col mb-stack-lg">
<div class="relative flex-grow flex flex-col bg-surface-container-low rounded-xl overflow-hidden ring-1 ring-inset ring-outline-variant/20 focus-within:ring-primary-container transition-all">
<textarea class="w-full flex-grow p-4 bg-transparent border-none focus:ring-0 text-body-lg font-body-lg text-on-surface placeholder:text-on-surface-variant/50 resize-none" id="note-area" placeholder="Escribe aquí las observaciones sobre el rendimiento, técnica o recuperación del atleta..." rows="10"></textarea>
<!-- Bottom Toolbar of Textarea -->
<div class="px-4 py-2 border-t border-outline-variant/10 flex justify-between items-center bg-surface-container/30">
<div class="flex gap-4">
<button class="text-on-surface-variant hover:text-primary active:scale-90 transition-all">
<span class="material-symbols-outlined text-[20px]" data-icon="attach_file">attach_file</span>
</button>
<button class="text-on-surface-variant hover:text-primary active:scale-90 transition-all">
<span class="material-symbols-outlined text-[20px]" data-icon="mic">mic</span>
</button>
</div>
<span class="font-label-sm text-label-sm text-on-surface-variant/60" id="char-count">0 caracteres</span>
</div>
</div>
</section>
<!-- Metadata Swatches -->
<section class="mb-32">
<div class="grid grid-cols-2 gap-stack-md">
<div class="bg-surface-container p-4 rounded-xl flex items-center gap-3">
<div class="w-8 h-8 rounded-lg bg-primary-container/10 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-[18px]" data-icon="calendar_month">calendar_month</span>
</div>
<div>
<p class="font-label-sm text-[10px] text-on-surface-variant uppercase tracking-wider">FECHA</p>
<p class="font-label-bold text-label-bold text-primary">24 Oct, 2023</p>
</div>
</div>
<div class="bg-surface-container p-4 rounded-xl flex items-center gap-3">
<div class="w-8 h-8 rounded-lg bg-secondary-container/20 flex items-center justify-center">
<span class="material-symbols-outlined text-secondary text-[18px]" data-icon="visibility">visibility</span>
</div>
<div>
<p class="font-label-sm text-[10px] text-on-surface-variant uppercase tracking-wider">VISIBILIDAD</p>
<p class="font-label-bold text-label-bold text-primary">Solo Coach</p>
</div>
</div>
</div>
</section>
</main>
<!-- Fixed Bottom Action Area -->
<footer class="fixed bottom-0 left-0 w-full p-margin-main bg-gradient-to-t from-background via-background to-transparent pt-8 z-40">
<button class="w-full h-14 bg-primary-container text-on-primary font-headline-sm rounded-xl flex items-center justify-center gap-2 active:scale-95 transition-all shadow-lg shadow-primary/20 hover:bg-primary" id="save-btn">
<span class="material-symbols-outlined" data-icon="save">save</span>
            Guardar Nota
        </button>
</footer>
<script>
        // Character counter logic
        const textarea = document.getElementById('note-area');
        const charCountDisplay = document.getElementById('char-count');
        
        textarea.addEventListener('input', () => {
            const count = textarea.value.length;
            charCountDisplay.textContent = `${count} caracteres`;
        });

        // Category selection interaction
        function selectCategory(element) {
            document.querySelectorAll('.category-chip').forEach(chip => {
                chip.classList.remove('active', 'bg-primary-container', 'text-on-primary');
                chip.classList.add('bg-surface-container-high', 'text-on-surface-variant');
            });
            element.classList.add('active');
            // Adding primary styles specifically for visual emphasis
            element.classList.remove('bg-surface-container-high', 'text-on-surface-variant');
            element.classList.add('bg-primary-container', 'text-on-primary');
        }

        // Save interaction simulation
        const saveBtn = document.getElementById('save-btn');
        saveBtn.addEventListener('click', () => {
            saveBtn.innerHTML = '<span class="material-symbols-outlined animate-spin" data-icon="sync">sync</span> Guardando...';
            saveBtn.classList.add('opacity-80');
            
            setTimeout(() => {
                saveBtn.innerHTML = '<span class="material-symbols-outlined" data-icon="check_circle">check_circle</span> Guardado';
                saveBtn.classList.remove('bg-primary-container');
                saveBtn.classList.add('bg-secondary-container', 'text-on-secondary-container');
                
                setTimeout(() => {
                    // Reset or navigate back simulation
                    saveBtn.innerHTML = '<span class="material-symbols-outlined" data-icon="save">save</span> Guardar Nota';
                    saveBtn.classList.remove('bg-secondary-container', 'text-on-secondary-container');
                    saveBtn.classList.add('bg-primary-container', 'text-on-primary');
                }, 2000);
            }, 1200);
        });

        // Initialize first chip as active
        window.onload = () => {
            const firstChip = document.querySelector('.category-chip');
            if(firstChip) selectCategory(firstChip);
        };
    </script>
</body></html>
