<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary": "#003953",
                    "on-secondary-fixed-variant": "#544600",
                    "primary-fixed": "#c8e6ff",
                    "surface-tint": "#2f6384",
                    "surface-container-lowest": "#ffffff",
                    "on-secondary": "#ffffff",
                    "surface-container-low": "#f3f3f8",
                    "on-tertiary-container": "#9bbbff",
                    "on-error": "#ffffff",
                    "inverse-on-surface": "#f0f0f5",
                    "outline": "#71787e",
                    "on-tertiary": "#ffffff",
                    "on-secondary-container": "#756100",
                    "on-surface-variant": "#41484d",
                    "on-error-container": "#93000a",
                    "tertiary-container": "#00489c",
                    "on-surface": "#1a1c1f",
                    "on-primary-container": "#90c2e7",
                    "on-secondary-fixed": "#221b00",
                    "tertiary-fixed": "#d8e2ff",
                    "on-tertiary-fixed": "#001a41",
                    "on-background": "#1a1c1f",
                    "surface-container": "#ededf2",
                    "secondary": "#705d00",
                    "surface-variant": "#e2e2e7",
                    "on-primary": "#ffffff",
                    "surface-container-high": "#e8e8ed",
                    "outline-variant": "#c1c7ce",
                    "error-container": "#ffdad6",
                    "surface-container-highest": "#e2e2e7",
                    "surface": "#f9f9fe",
                    "error": "#ba1a1a",
                    "on-primary-fixed-variant": "#0e4b6b",
                    "secondary-fixed": "#ffe16e",
                    "on-primary-fixed": "#001e2f",
                    "tertiary-fixed-dim": "#adc6ff",
                    "surface-bright": "#f9f9fe",
                    "inverse-primary": "#9accf2",
                    "secondary-fixed-dim": "#e4c542",
                    "primary-container": "#165070",
                    "inverse-surface": "#2e3034",
                    "surface-dim": "#d9dade",
                    "primary-fixed-dim": "#9accf2",
                    "on-tertiary-fixed-variant": "#004493",
                    "tertiary": "#003271",
                    "background": "#f9f9fe",
                    "secondary-container": "#ffde59"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "stack-md": "1rem",
                    "stack-sm": "0.5rem",
                    "gutter": "1rem",
                    "stack-lg": "1.5rem",
                    "safe-area-bottom": "2.125rem",
                    "margin-main": "1.25rem"
            },
            "fontFamily": {
                    "display-lg": ["Hanken Grotesk"],
                    "label-bold": ["Inter"],
                    "headline-sm": ["Hanken Grotesk"],
                    "body-lg": ["Inter"],
                    "stats-xl": ["Hanken Grotesk"],
                    "label-sm": ["Inter"],
                    "headline-md": ["Hanken Grotesk"],
                    "body-md": ["Inter"]
            },
            "fontSize": {
                    "display-lg": ["34px", {"lineHeight": "41px", "letterSpacing": "-0.5px", "fontWeight": "800"}],
                    "label-bold": ["13px", {"lineHeight": "18px", "fontWeight": "600"}],
                    "headline-sm": ["20px", {"lineHeight": "25px", "fontWeight": "600"}],
                    "body-lg": ["17px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "stats-xl": ["48px", {"lineHeight": "48px", "letterSpacing": "-1px", "fontWeight": "800"}],
                    "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
                    "headline-md": ["24px", {"lineHeight": "30px", "letterSpacing": "0px", "fontWeight": "700"}],
                    "body-md": ["15px", {"lineHeight": "20px", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #165070;
            box-shadow: 0 0 0 2px rgba(22, 80, 112, 0.1);
        }
        input[type="date"]::-webkit-calendar-picker-indicator,
        input[type="time"]::-webkit-calendar-picker-indicator {
            cursor: pointer;
            opacity: 0.6;
            transition: 0.2s;
        }
        input[type="date"]::-webkit-calendar-picker-indicator:hover,
        input[type="time"]::-webkit-calendar-picker-indicator:hover {
            opacity: 1;
        }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen pb-safe-area-bottom">
<!-- Top Navigation Anchor (Shared Component) -->
<header class="sticky top-0 w-full z-50 bg-surface/80 dark:bg-surface-dim/80 backdrop-blur-md flex items-center justify-between px-margin-main h-14 w-full border-b border-outline-variant/20">
<button class="flex items-center justify-center w-10 h-10 active:scale-95 transition-transform">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="close">close</span>
</button>
<h1 class="font-headline-sm text-headline-sm text-primary">Nueva Sesión de Running</h1>
<button class="font-label-bold text-label-bold text-primary active:scale-95 transition-transform">Guardar</button>
</header>
<main class="px-margin-main py-stack-lg max-w-2xl mx-auto pb-32">
<!-- Hero Section / Context Card -->
<div class="mb-stack-lg relative overflow-hidden rounded-xl h-40 group">
<img alt="Running Session" class="absolute inset-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" data-alt="A fit male athlete in high-performance running gear sprinting along a scenic coastal path during the golden hour." src="https://www.gstatic.com/labs-code/stitch/stitch-placeholder-300x300.svg"/>
<div class="absolute inset-0 bg-gradient-to-t from-primary/80 to-transparent flex items-end p-stack-md">
<div class="flex items-center gap-2 bg-secondary-container text-on-secondary-fixed-variant px-3 py-1 rounded-full shadow-sm">
<span class="material-symbols-outlined text-[18px]" data-icon="speed" style="font-variation-settings: 'FILL' 1;">speed</span>
<span class="font-label-bold text-label-bold">Planificación de Coach</span>
</div>
</div>
</div>
<form class="space-y-stack-lg">
<!-- Basic Info Section -->
<section class="space-y-stack-md">
<div class="flex items-center gap-2 mb-2">
<span class="w-1 h-6 bg-secondary-container rounded-full"></span>
<h2 class="font-headline-sm text-headline-sm text-primary">Detalles del Desafío</h2>
</div>
<div class="space-y-4">
<!-- Date and Time Grid -->
<div class="grid grid-cols-2 gap-4">
<div class="group">
<label class="block font-label-bold text-label-bold text-on-surface-variant mb-1 ml-1">Fecha de la Sesión</label>
<div class="relative">
<input class="w-full h-12 px-4 rounded-xl border border-outline-variant bg-surface-container-lowest font-body-lg text-body-lg transition-all" type="date"/>
</div>
</div>
<div class="group">
<label class="block font-label-bold text-label-bold text-on-surface-variant mb-1 ml-1">Hora de Salida</label>
<div class="relative">
<input class="w-full h-12 px-4 rounded-xl border border-outline-variant bg-surface-container-lowest font-body-lg text-body-lg transition-all" type="time"/>
</div>
</div>
</div>
<!-- Challenge Name -->
<div class="group">
<label class="block font-label-bold text-label-bold text-on-surface-variant mb-1 ml-1">Nombre de la Ruta/Desafío</label>
<input class="w-full h-12 px-4 rounded-xl border border-outline-variant bg-surface-container-lowest font-body-lg text-body-lg transition-all" placeholder="ej. Fondo Dominical por la Costa" type="text"/>
</div>
<!-- Distance -->
<div class="group">
<label class="block font-label-bold text-label-bold text-on-surface-variant mb-1 ml-1">Distancia Objetivo (KM)</label>
<div class="relative">
<input class="w-full h-12 px-4 pr-12 rounded-xl border border-outline-variant bg-surface-container-lowest font-body-lg text-body-lg transition-all" placeholder="0.0" step="0.1" type="number"/>
<span class="absolute right-4 top-1/2 -translate-y-1/2 text-outline font-label-sm">KM</span>
</div>
</div>
</div>
</section>
<!-- Route Section -->
<section class="space-y-stack-md pt-2">
<div class="flex items-center gap-2 mb-2">
<span class="w-1 h-6 bg-secondary-container rounded-full"></span>
<h2 class="font-headline-sm text-headline-sm text-primary">Ruta y Ubicación</h2>
</div>
<div class="glass-card border border-outline-variant/30 rounded-xl p-4 space-y-4 shadow-sm bg-surface-container-lowest">
<!-- Map Interaction Button -->
<button class="w-full h-12 border-2 border-primary-container text-primary-container rounded-lg font-label-bold flex items-center justify-center gap-2 hover:bg-primary-container/5 active:scale-[0.98] transition-all" type="button">
<span class="material-symbols-outlined" data-icon="edit_location">edit_location</span>
    Marcar Ruta en el Mapa
</button>
<!-- Map Placeholder -->
<div class="relative w-full h-40 rounded-lg bg-surface-container-high overflow-hidden border border-outline-variant/20 shadow-inner">
<img alt="Map Preview" class="w-full h-full object-cover opacity-80" data-alt="A stylized aerial satellite view of a city grid layout featuring intricate streets and coastal features. The map uses a sophisticated monochromatic blueprint style with deep primary blues and high-contrast outlines. The overall mood is precise and technical, reflecting a disciplined athletic planning environment with clean white accents for landmarks." data-location="Barcelona, Spain" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD3xmFHJ6n9kueOjNccqPzynUGOxpPO1Kvh1f43L6d2wrAjaGuz1fUpy9RRpUNq8yJLvDRspsySFfuCHTalU4x4Y26b5yobzuPWPRQF4eUA7yhEILP_MXog569c_4bpmhftDnjWMJlo7cmd2QY9OMQApQhp-74qKAtQZP72bg4CGt0hhVIQZHnkZeYeEm6udUUq4zxiBgIhmBr8yk2UAwO4JXg9ZYgHO4Kh6VgDaUpTkbKwIp4vSNR0AJ-O3MHNaL9zdPh1ASir-kIc"/>
<div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none bg-surface/20">
<span class="material-symbols-outlined text-primary mb-1 drop-shadow-md" data-icon="location_on" style="font-variation-settings: 'FILL' 1;">location_on</span>
<span class="font-label-sm text-label-sm text-primary bg-surface-container-lowest/80 px-2 py-1 rounded-md backdrop-blur-sm">Vista previa de ruta</span>
</div>
</div>
<!-- Link Input -->
<div class="flex items-center gap-3 p-3 bg-surface-container rounded-lg">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="link">link</span>
<div class="flex-1">
<input class="w-full bg-transparent border-none p-0 focus:ring-0 font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/70" placeholder="Pegar enlace de Strava o Google Maps" type="text"/>
</div>
</div>
</div>
</section>
<!-- Additional Notes -->
<section class="space-y-stack-md pt-2">
<div class="flex items-center gap-2 mb-2">
<span class="w-1 h-6 bg-secondary-container rounded-full"></span>
<h2 class="font-headline-sm text-headline-sm text-primary">Notas Adicionales</h2>
</div>
<textarea class="w-full p-4 rounded-xl border border-outline-variant bg-surface-container-lowest font-body-md text-body-md transition-all resize-none shadow-sm" placeholder="Instrucciones para el calentamiento, hidratación o intervalos específicos..." rows="4"></textarea>
</section>
<!-- Action Button -->
<div class="pt-stack-lg">
<button class="w-full h-14 bg-primary-container text-white rounded-xl font-headline-sm flex items-center justify-center gap-2 active:scale-95 transition-transform shadow-lg shadow-primary-container/20" type="submit">
<span class="material-symbols-outlined" data-icon="check_circle">check_circle</span>
                    Publicar Sesión
                </button>
</div>
</form>
</main>
<!-- Bottom Navigation (Coach Context) -->
<nav class="fixed bottom-0 w-full bg-surface-container-lowest border-t border-outline-variant/20 pb-safe-area-bottom z-50">
<div class="flex justify-around items-center h-16 px-2">
<button class="flex flex-col items-center justify-center w-16 h-full text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[24px] mb-1" data-icon="home">home</span>
<span class="text-[10px] font-label-bold">Inicio</span>
</button>
<button class="flex flex-col items-center justify-center w-16 h-full text-primary transition-colors">
<div class="px-4 py-1 bg-secondary-container/20 rounded-full mb-1">
<span class="material-symbols-outlined text-[24px]" data-icon="fitness_center" style="font-variation-settings: 'FILL' 1;">fitness_center</span>
</div>
<span class="text-[10px] font-label-bold">WODs</span>
</button>
<button class="flex flex-col items-center justify-center w-16 h-full text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[24px] mb-1" data-icon="groups">groups</span>
<span class="text-[10px] font-label-bold">Atletas</span>
</button>
<button class="flex flex-col items-center justify-center w-16 h-full text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[24px] mb-1" data-icon="notifications">notifications</span>
<span class="text-[10px] font-label-bold">Alertas</span>
</button>
<button class="flex flex-col items-center justify-center w-16 h-full text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[24px] mb-1" data-icon="trending_up">trending_up</span>
<span class="text-[10px] font-label-bold">Progreso</span>
</button>
</div>
</nav>
<script>
        // Micro-interaction for inputs
        document.querySelectorAll('input, textarea').forEach(el => {
            el.addEventListener('focus', () => {
                el.parentElement.classList.add('scale-[1.01]');
            });
            el.addEventListener('blur', () => {
                el.parentElement.classList.remove('scale-[1.01]');
            });
        });
    </script>
</body></html>
