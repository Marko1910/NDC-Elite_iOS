<style>
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .ios-shadow {
            box-shadow: 0 4px 12px rgba(0, 57, 83, 0.08);
        }
        .chip-active {
            background-color: rgba(0, 57, 83, 0.1);
            color: #003953;
        }
        .btn-active:active {
            transform: scale(0.96);
            transition: transform 0.1s ease;
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body-md min-h-screen pb-32">
<!-- TopAppBar -->
<header class="bg-surface/80 backdrop-blur-md sticky top-0 z-50 flex items-center justify-between px-margin-main py-4 w-full border-b border-outline-variant/30">
<button class="w-10 h-10 flex items-center justify-start text-on-surface">
<span class="material-symbols-outlined">close</span>
</button>
<h1 class="font-headline-sm text-headline-sm text-primary flex-1 text-center">Registrar Resultado</h1>
<button class="text-primary font-label-bold px-2 py-1">Guardar</button>
</header>
<main class="px-margin-main mt-stack-lg"><div class="space-y-stack-lg">
<!-- WOD Info Card -->
<div class="bg-primary-container rounded-xl p-5 text-on-primary-container shadow-lg">
<div class="flex justify-between items-start mb-2">
<h2 class="font-display-lg text-headline-md leading-tight">El Desafío Híbrido</h2>
<span class="px-3 py-1 rounded-full text-label-sm font-label-sm bg-white/20 text-white">RX</span>
</div>
<p class="text-label-sm opacity-90">Hoy, Sábado 30 de Mayo • Fuerza &amp; Metcon</p>
</div>
<!-- Section: Warm-up / Technique -->
<section class="space-y-stack-sm">
<h3 class="font-label-bold text-outline uppercase">Tareas Completadas</h3>
<div class="bg-surface-container-low rounded-xl border border-outline-variant/30 divide-y divide-outline-variant/20">
<label class="flex items-center gap-3 p-4">
<input checked="" class="w-6 h-6 rounded border-outline-variant text-primary focus:ring-primary" type="checkbox"/>
<span class="text-body-md">Calentamiento (3 Rondas)</span>
</label>
<label class="flex items-center gap-3 p-4">
<input class="w-6 h-6 rounded border-outline-variant text-primary focus:ring-primary" type="checkbox"/>
<span class="text-body-md">Back Squat (5 Sets de 3 Reps)</span>
</label>
</div>
</section>
<!-- Section: Metcon Result -->
<section class="space-y-stack-sm">
<h3 class="font-label-bold text-outline uppercase">Resultado Metcon</h3>
<div class="bg-white rounded-xl p-5 ios-shadow border border-outline-variant/20">
<div class="grid grid-cols-2 gap-4">
<div class="space-y-1">
<label class="text-label-sm text-outline">Minutos</label>
<input class="w-full bg-surface-container rounded-lg border-none p-3 text-center text-headline-md focus:ring-2 focus:ring-primary" placeholder="00" type="number"/>
</div>
<div class="space-y-1">
<label class="text-label-sm text-outline">Segundos</label>
<input class="w-full bg-surface-container rounded-lg border-none p-3 text-center text-headline-md focus:ring-2 focus:ring-primary" placeholder="00" type="number"/>
</div>
</div>
<div class="mt-4 space-y-1">
<label class="text-label-sm text-outline">Peso Utilizado (lbs)</label>
<input class="w-full bg-surface-container rounded-lg border-none p-3 text-body-lg focus:ring-2 focus:ring-primary" placeholder="Ej: 135" type="number"/>
</div>
</div>
</section>
<!-- Section: Intensity -->
<section class="space-y-stack-sm">
<h3 class="font-label-bold text-outline uppercase">Nivel de Intensidad</h3>
<div class="grid grid-cols-3 gap-2">
<button class="py-3 rounded-lg border border-outline-variant text-label-sm font-label-bold bg-surface">Principiante</button>
<button class="py-3 rounded-lg bg-primary text-on-primary text-label-sm font-label-bold">Intermedio</button>
<button class="py-3 rounded-lg border border-outline-variant text-label-sm font-label-bold bg-surface">Avanzado</button>
</div>
</section>
<!-- Section: Notes -->
<section class="space-y-stack-sm">
<h3 class="font-label-bold text-outline uppercase">Notas del Atleta</h3>
<textarea class="w-full bg-white rounded-xl border border-outline-variant/30 p-4 text-body-md focus:ring-2 focus:ring-primary" placeholder="¿Cómo te sentiste hoy? Ej: Escalé los pesos..." rows="3"></textarea>
</section>
<!-- Confirm Button -->
<div class="pt-4 mb-8">
<button class="w-full bg-primary text-on-primary font-headline-sm py-4 rounded-xl shadow-lg flex items-center justify-center gap-2 btn-active">
<span class="material-symbols-outlined">check_circle</span>
      Confirmar Resultado
    </button>
</div>
</div></main>
<!-- BottomNavBar -->
<nav class="bg-surface/80 dark:bg-surface-dim/80 backdrop-blur-md fixed bottom-0 left-0 w-full flex justify-around items-center px-4 py-2 pb-safe-area-bottom z-50"><a class="flex flex-col items-center justify-center text-outline dark:text-outline-variant font-label-sm text-label-sm p-2 hover:bg-surface-variant/20 rounded-full transition-all" href="#"><span class="material-symbols-outlined">home</span><span>Inicio</span></a><a class="flex flex-col items-center justify-center text-secondary font-bold font-label-sm text-label-sm p-2 hover:bg-surface-variant/20 rounded-full transition-all" href="#"><span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">fitness_center</span><span>WOD</span></a><a class="flex flex-col items-center justify-center text-outline dark:text-outline-variant font-label-sm text-label-sm p-2 hover:bg-surface-variant/20 rounded-full transition-all" href="#"><span class="material-symbols-outlined">show_chart</span><span>Progreso</span></a><a class="flex flex-col items-center justify-center text-outline dark:text-outline-variant font-label-sm text-label-sm p-2 hover:bg-surface-variant/20 rounded-full transition-all" href="#"><span class="material-symbols-outlined">groups</span><span>Comunidad</span></a><a class="flex flex-col items-center justify-center text-outline dark:text-outline-variant font-label-sm text-label-sm p-2 hover:bg-surface-variant/20 rounded-full transition-all" href="#"><span class="material-symbols-outlined">person</span><span>Perfil</span></a></nav>
<script>
        // Simple interaction for buttons and feedback
        document.querySelectorAll('.btn-active').forEach(button => {
            button.addEventListener('mousedown', () => {
                button.style.transform = 'scale(0.96)';
            });
            button.addEventListener('mouseup', () => {
                button.style.transform = 'scale(1)';
            });
            button.addEventListener('mouseleave', () => {
                button.style.transform = 'scale(1)';
            });
        });

        // Date update
        const dateEl = document.querySelector('.uppercase.tracking-wider');
        const options = { weekday: 'long', day: 'numeric', month: 'long' };
        const today = new Date().toLocaleDateString('es-ES', options);
        dateEl.textContent = `Hoy, ${today}`;
    </script>
</body></html>
