<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",

          extend: {
            "colors": {
                    "secondary-fixed": "#ffe16e",
                    "on-tertiary-fixed-variant": "#004493",
                    "surface-container-lowest": "#ffffff",
                    "on-primary-container": "#90c2e7",
                    "surface-bright": "#f9f9fe",
                    "on-primary": "#ffffff",
                    "on-tertiary-container": "#9bbbff",
                    "surface-tint": "#2f6384",
                    "on-secondary-fixed-variant": "#544600",
                    "on-error": "#ffffff",
                    "surface-container": "#ededf2",
                    "primary": "#003953",
                    "surface-container-low": "#f3f3f8",
                    "secondary": "#705d00",
                    "outline-variant": "#c1c7ce",
                    "on-tertiary": "#ffffff",
                    "outline": "#71787e",
                    "on-background": "#1a1c1f",
                    "on-surface": "#1a1c1f",
                    "tertiary": "#003271",
                    "inverse-on-surface": "#f0f0f5",
                    "on-secondary-fixed": "#221b00",
                    "inverse-primary": "#9accf2",
                    "inverse-surface": "#2e3034",
                    "surface-variant": "#e2e2e7",
                    "tertiary-fixed": "#d8e2ff",
                    "secondary-fixed-dim": "#e4c542",
                    "primary-container": "#165070",
                    "on-secondary": "#ffffff",
                    "error-container": "#ffdad6",
                    "background": "#f9f9fe",
                    "surface-container-high": "#e8e8ed",
                    "on-primary-fixed": "#001e2f",
                    "on-tertiary-fixed": "#001a41",
                    "secondary-container": "#ffde59",
                    "error": "#ba1a1a",
                    "on-surface-variant": "#41484d",
                    "surface-container-highest": "#e2e2e7",
                    "tertiary-container": "#00489c",
                    "surface": "#f9f9fe",
                    "on-secondary-container": "#756100",
                    "tertiary-fixed-dim": "#adc6ff",
                    "surface-dim": "#d9dade",
                    "on-error-container": "#93000a",
                    "on-primary-fixed-variant": "#0e4b6b",
                    "primary-fixed-dim": "#9accf2",
                    "primary-fixed": "#c8e6ff"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "gutter": "1rem",
                    "margin-main": "1.25rem",
                    "stack-lg": "1.5rem",
                    "stack-sm": "0.5rem",
                    "safe-area-bottom": "2.125rem",
                    "stack-md": "1rem"
            },
            "fontFamily": {
                    "label-sm": ["Inter"],
                    "body-md": ["Inter"],
                    "body-lg": ["Inter"],
                    "label-bold": ["Inter"],
                    "headline-sm": ["Hanken Grotesk"],
                    "display-lg": ["Hanken Grotesk"],
                    "headline-md": ["Hanken Grotesk"],
                    "stats-xl": ["Hanken Grotesk"]
            },
            "fontSize": {
                    "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
                    "body-md": ["15px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "body-lg": ["17px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "label-bold": ["13px", {"lineHeight": "18px", "fontWeight": "600"}],
                    "headline-sm": ["20px", {"lineHeight": "25px", "fontWeight": "600"}],
                    "display-lg": ["34px", {"lineHeight": "41px", "letterSpacing": "-0.5px", "fontWeight": "800"}],
                    "headline-md": ["24px", {"lineHeight": "30px", "letterSpacing": "0px", "fontWeight": "700"}],
                    "stats-xl": ["48px", {"lineHeight": "48px", "letterSpacing": "-1px", "fontWeight": "800"}]
            }
          },
        },
      }
    </script>
<style>
        body { -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .body-zone-active { background-color: #ffde59; color: #003953; }
        .pain-selector input:checked + label { transform: scale(1.05); font-weight: 700; border-width: 2px; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen font-body-md flex flex-col">
<!-- TopAppBar -->
<header class="sticky top-0 w-full z-50 bg-surface/80 backdrop-blur-md flex items-center justify-between px-margin-main h-14">
<button aria-label="Cerrar" class="flex items-center justify-center w-10 h-10 active:scale-95 transition-transform">
<span class="material-symbols-outlined text-on-surface-variant">close</span>
</button>
<h1 class="font-headline-sm text-headline-sm text-primary">Nueva Lesión</h1>
<button class="font-label-bold text-label-bold text-primary active:scale-95 transition-transform">Guardar</button>
</header>
<main class="flex-1 pb-32">
<div class="px-margin-main pt-stack-md space-y-stack-lg">
<!-- Body Zone Selector -->
<section class="space-y-stack-md">
<h2 class="font-label-bold text-label-bold text-on-surface-variant uppercase tracking-wider">Zona del Cuerpo</h2>
<div class="grid grid-cols-3 gap-3">
<button class="flex flex-col items-center justify-center p-4 bg-surface-container-low rounded-xl border border-transparent transition-all active:scale-95" onclick="toggleZone(this)">
<span class="material-symbols-outlined mb-2">person</span>
<span class="font-label-sm text-label-sm">Cabeza</span>
</button>
<button class="flex flex-col items-center justify-center p-4 bg-surface-container-low rounded-xl border border-transparent transition-all active:scale-95" onclick="toggleZone(this)">
<span class="material-symbols-outlined mb-2">accessibility_new</span>
<span class="font-label-sm text-label-sm">Hombros</span>
</button>
<button class="flex flex-col items-center justify-center p-4 bg-surface-container-low rounded-xl border border-transparent transition-all active:scale-95" onclick="toggleZone(this)">
<span class="material-symbols-outlined mb-2">straighten</span>
<span class="font-label-sm text-label-sm">Espalda</span>
</button>
<button class="flex flex-col items-center justify-center p-4 bg-surface-container-low rounded-xl border border-transparent transition-all active:scale-95" onclick="toggleZone(this)">
<span class="material-symbols-outlined mb-2">draw</span>
<span class="font-label-sm text-label-sm">Codos</span>
</button>
<button class="flex flex-col items-center justify-center p-4 bg-surface-container-low rounded-xl border border-transparent transition-all active:scale-95" onclick="toggleZone(this)">
<span class="material-symbols-outlined mb-2">pan_tool</span>
<span class="font-label-sm text-label-sm">Muñecas</span>
</button>
<button class="flex flex-col items-center justify-center p-4 bg-surface-container-low rounded-xl border border-transparent transition-all active:scale-95" onclick="toggleZone(this)">
<span class="material-symbols-outlined mb-2">fitness_center</span>
<span class="font-label-sm text-label-sm">Lumbar</span>
</button>
<button class="flex flex-col items-center justify-center p-4 bg-surface-container-low rounded-xl border border-transparent transition-all active:scale-95" onclick="toggleZone(this)">
<span class="material-symbols-outlined mb-2">wc</span>
<span class="font-label-sm text-label-sm">Cadera</span>
</button>
<button class="flex flex-col items-center justify-center p-4 bg-surface-container-low rounded-xl border border-transparent transition-all active:scale-95" onclick="toggleZone(this)">
<span class="material-symbols-outlined mb-2">airline_seat_legroom_extra</span>
<span class="font-label-sm text-label-sm">Rodillas</span>
</button>
<button class="flex flex-col items-center justify-center p-4 bg-surface-container-low rounded-xl border border-transparent transition-all active:scale-95" onclick="toggleZone(this)">
<span class="material-symbols-outlined mb-2">hiking</span>
<span class="font-label-sm text-label-sm">Tobillos</span>
</button>
</div>
</section>
<!-- Pain Level -->
<section class="space-y-stack-md">
<h2 class="font-label-bold text-label-bold text-on-surface-variant uppercase tracking-wider">Nivel de Dolor</h2>
<div class="flex gap-3 pain-selector">
<input class="hidden peer/mild" id="mild" name="pain" type="radio"/>
<label class="flex-1 text-center py-3 rounded-xl border border-outline-variant bg-surface-container-low peer-checked/mild:bg-secondary-container peer-checked/mild:border-secondary transition-all cursor-pointer" for="mild">
<span class="font-label-bold text-label-bold block">Leve</span>
</label>
<input class="hidden peer/mod" id="moderate" name="pain" type="radio"/>
<label class="flex-1 text-center py-3 rounded-xl border border-outline-variant bg-surface-container-low peer-checked/mod:bg-orange-100 peer-checked/mod:border-orange-500 transition-all cursor-pointer" for="moderate">
<span class="font-label-bold text-label-bold block">Moderado</span>
</label>
<input class="hidden peer/sev" id="severe" name="pain" type="radio"/>
<label class="flex-1 text-center py-3 rounded-xl border border-outline-variant bg-surface-container-low peer-checked/sev:bg-error-container peer-checked/sev:border-error transition-all cursor-pointer" for="severe">
<span class="font-label-bold text-label-bold block">Severo</span>
</label>
</div>
</section>
<!-- Description -->
<section class="space-y-stack-md">
<h2 class="font-label-bold text-label-bold text-on-surface-variant uppercase tracking-wider">Descripción</h2>
<textarea class="w-full h-32 p-4 bg-surface-container-low rounded-xl border-none focus:ring-2 focus:ring-primary font-body-lg text-body-lg" placeholder="Ej: Pinchazo al hacer sentadilla profunda..."></textarea>
</section>
<!-- Date Selector -->
<section class="space-y-stack-md">
<h2 class="font-label-bold text-label-bold text-on-surface-variant uppercase tracking-wider">Fecha del Incidente</h2>
<div class="flex items-center gap-3 p-4 bg-surface-container-low rounded-xl border-none">
<span class="material-symbols-outlined text-outline">calendar_today</span>
<input class="bg-transparent border-none p-0 focus:ring-0 font-body-lg text-body-lg w-full" type="date" value="2023-10-27"/>
</div>
</section>
<!-- CTA -->
<section class="pt-4">
<button class="w-full bg-primary text-white py-4 rounded-xl font-headline-sm text-headline-sm shadow-lg active:scale-[0.98] transition-all hover:bg-primary-container">
                    Guardar Registro
                </button>
</section>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 pb-safe-area-bottom bg-surface/80 backdrop-blur-md border-t border-outline-variant/30 flex justify-around items-center h-16 px-2">
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-low transition-colors active:scale-90 w-full h-full" href="#">
<span class="material-symbols-outlined">home</span>
<span class="font-label-sm text-label-sm">Inicio</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-low transition-colors active:scale-90 w-full h-full" href="#">
<span class="material-symbols-outlined">fitness_center</span>
<span class="font-label-sm text-label-sm">WOD</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-low transition-colors active:scale-90 w-full h-full" href="#">
<span class="material-symbols-outlined">trending_up</span>
<span class="font-label-sm text-label-sm">Progreso</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-low transition-colors active:scale-90 w-full h-full" href="#">
<span class="material-symbols-outlined">groups</span>
<span class="font-label-sm text-label-sm">Comunidad</span>
</a>
<a class="flex flex-col items-center justify-center text-primary font-bold transition-colors active:scale-90 w-full h-full" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">person</span>
<span class="font-label-sm text-label-sm">Perfil</span>
</a>
</nav>
<script>
        function toggleZone(btn) {
            // Deselect others if needed, or allow multiple
            // For now, simple toggle
            const isActive = btn.classList.contains('body-zone-active');
            
            // Optional: reset all first
            document.querySelectorAll('.body-zone-active').forEach(b => {
                b.classList.remove('body-zone-active');
                b.classList.add('bg-surface-container-low');
                b.querySelector('.material-symbols-outlined').style.fontVariationSettings = "'FILL' 0";
            });

            if (!isActive) {
                btn.classList.add('body-zone-active');
                btn.classList.remove('bg-surface-container-low');
                btn.querySelector('.material-symbols-outlined').style.fontVariationSettings = "'FILL' 1";
            }
        }

        // Initialize date to today
        document.addEventListener('DOMContentLoaded', () => {
            const today = new Date().toISOString().split('T')[0];
            const dateInput = document.querySelector('input[type="date"]');
            if (dateInput) dateInput.value = today;
        });
    </script>
</body></html>
